apiVersion: apps/v1
kind: Deployment

metadata:
  name: todo-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: todo-app

  template:
    metadata:
      labels:
        app: todo-app

    spec:
      containers:
      - name: todo-app
        image: rakeshjha33/python-todo:v1

        ports:
        - containerPort: 8000

---

apiVersion: v1
kind: Service

metadata:
  name: todo-service

spec:
  type: NodePort

  selector:
    app: todo-app

  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
      nodePort: 31000
